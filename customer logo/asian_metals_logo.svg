<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#A0A0A0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal metal icon -->
  <polygon points="60,20 100,40 100,80 60,100 20,80 20,40" fill="url(#metalGrad)" stroke="#808080" stroke-width="2"/>
  <!-- Inner hexagon -->
  <polygon points="60,35 85,48 85,72 60,85 35,72 35,48" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <!-- A letter inside -->
  <text x="60" y="72" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#333" text-anchor="middle">A</text>
  <!-- Asian Metals text -->
  <text x="120" y="65" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#2C3E50" letter-spacing="1">Asian</text>
  <text x="120" y="105" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#B8860B" letter-spacing="1">Metals</text>
  <!-- Subtle underline -->
  <line x1="120" y1="115" x2="380" y2="115" stroke="#B8860B" stroke-width="2"/>
</svg>